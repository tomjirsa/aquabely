services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - AQUABELY_DB=/data/aquabely.db
      - AQUABELY_INBOX=/inbox
    volumes:
      - aquabely-data:/data
      - aquabely-inbox:/inbox

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:445"
    environment:
      - DOMAIN=${DOMAIN}
      - AUTH_USER=${AUTH_USER}
      - AUTH_HASH=${AUTH_HASH}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app

volumes:
  aquabely-data:
  aquabely-inbox:
  caddy-data:
  caddy-config:
